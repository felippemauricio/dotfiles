# tmux configuration.

# Mouse support — the scroll wheel scrolls the pane's history, click selects a
# pane or window, and dragging a border resizes it. (In iTerm2, hold Option
# while dragging to bypass tmux and select text for the native clipboard.)
set -g mouse on

# Large scrollback buffer so you can scroll far up to re-read output. Applies to
# panes created after this file loads. The buffer lives in RAM, so cost scales
# with lines × open panes (~100 MB per pane at a million lines).
set -g history-limit 1000000
